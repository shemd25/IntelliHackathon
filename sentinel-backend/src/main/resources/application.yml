server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: sentinel-backend

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:sentinel}
    username: ${DB_USER:sentinel}
    password: ${DB_PASS:sentinel}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: sentinel-backend
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.sentinel.backend.dto

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}

# JWT
sentinel:
  jwt:
    secret: ${JWT_SECRET:sentinelHackathonSuperSecretKeyThatIsAtLeast256BitsLong2026!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Kafka topic names
  kafka:
    topics:
      location: sentinel.location.stream
      motion: sentinel.motion.stream
      alerts: sentinel.alerts.outbound

logging:
  level:
    com.sentinel: DEBUG
    org.springframework.web.socket: DEBUG
